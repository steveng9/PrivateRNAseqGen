data:
  real_splits_dir: "~/Health-Privacy-Challenge/data_splits"
  dataset: "TCGA-COMBINED"
  subtype_col: "cancer_type"    # 33 tissue-of-origin types
  num_splits: 5

output:
  synthetic_dir: "~/Health-Privacy-Challenge/data_splits"
  model_dir: "~/private-pgm-rnaseq-camda2026/models"

generator:
  random_seed: 123

  # Privacy budget
  epsilon: 100.0
  delta: 0.00001
  budget_weights: [0.50, 0.25, 0.15, 0.10]

  # Marginal selection  (S, R, Q, P in the plan)
  n_1way: 300
  n_2way: 70
  n_3way: 20
  n_4way: 5

  # Discretization
  n_bins: 8

  # PGM optimisation
  pgm_iters: 1000

  n_synth_samples: -1

  # --- Comparison mode (last year's approach) ---
  # Set joint_mode: true to fit a single PGM over all data with label as a node.
  # All gene×label 2-way marginals are preserved; n_2way still controls additional
  # gene–gene pairs on top. WARNING: label as a hub increases treewidth — use
  # smaller n_bins / n_1way / n_2way when enabling this.
  joint_mode: false
